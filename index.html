<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💳 支払い集計ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; }
  header { background: #1a1a2e; color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .updated { font-size: 0.78rem; color: #aaa; }
  .tabs { display: flex; gap: 4px; padding: 16px 32px 0; background: white; border-bottom: 2px solid #e0e0e0; overflow-x: auto; }
  .tab { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 0.88rem; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all 0.2s; }
  .tab.active { color: #1a1a2e; border-bottom-color: #4361ee; font-weight: 600; }
  .tab:hover { color: #1a1a2e; }
  .content { padding: 24px 32px; display: none; }
  .content.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .card h2 { font-size: 1rem; color: #444; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .chart-wrap { position: relative; height: 300px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .kpi { background: white; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
  .kpi .label { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
  .kpi .value { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
  .kpi.alert { border-left: 4px solid #ef476f; }
  .kpi.warn { border-left: 4px solid #ffd60a; }
  .kpi.ok { border-left: 4px solid #06d6a0; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: #f4f6f9; padding: 10px 12px; text-align: right; font-weight: 600; color: #555; position: sticky; top: 0; }
  th:first-child { text-align: left; }
  td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; text-align: right; }
  td:first-child { text-align: left; }
  tr:hover td { background: #f9f9f9; }
  .total-row td { font-weight: 700; background: #f4f6f9 !important; border-top: 2px solid #ddd; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-red { background: #fde8ec; color: #c0392b; }
  .badge-yellow { background: #fff9e0; color: #9a6f00; }
  .badge-green { background: #e8f8f2; color: #1a7f5a; }
  .badge-gray { background: #f0f0f0; color: #666; }
  .badge-blue { background: #e8f0fe; color: #1a56db; }
  .diff-pos { color: #ef476f; font-weight: 600; }
  .diff-neg { color: #06d6a0; font-weight: 600; }
  .pie-wrap { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .pie-wrap canvas { max-width: 260px; max-height: 260px; }
  .legend { flex: 1; min-width: 200px; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.88rem; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { flex: 1; }
  .legend-val { font-weight: 600; color: #333; }
  .alert-list { display: flex; flex-direction: column; gap: 8px; }
  .alert-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 8px; background: #fdf2f4; border-left: 3px solid #ef476f; }
  .alert-item.warn { background: #fffbf0; border-left-color: #ffd60a; }
  .alert-item .name { font-weight: 500; }
  .alert-item .meta { font-size: 0.8rem; color: #888; margin-top: 2px; }
  .alert-item .amount { font-weight: 700; color: #c0392b; white-space: nowrap; }
  .alert-item.warn .amount { color: #9a6f00; }
  a.notion-link { font-size: 0.75rem; color: #4361ee; text-decoration: none; margin-left: 8px; }
  a.notion-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <h1><span>💳</span>支払い集計ダッシュボード</h1>
  <span class="updated">更新: <span id="updated-at"></span></span>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('home')">🏠 ホーム</button>
  <button class="tab" onclick="showTab('a')">📊 年度別合計</button>
  <button class="tab" onclick="showTab('b')">🏷 会計区分×年度</button>
  <button class="tab" onclick="showTab('c')">📂 種別×年度</button>
  <button class="tab" onclick="showTab('d')">📈 月別推移</button>
  <button class="tab" onclick="showTab('e')">💳 支払い方法</button>
  <button class="tab" onclick="showTab('f')">📅 前年同月比</button>
  <button class="tab" onclick="showTab('alert')">🚨 未払いアラート</button>
  <button class="tab" onclick="showTab('month')">📋 今月の支払い</button>
  <button class="tab" onclick="showTab('accounting')">📒 会計処理</button>
</div>

<!-- ホーム -->
<div id="tab-home" class="content active">
  <div class="grid" id="home-kpi"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;flex-wrap:wrap;">
    <div class="card">
      <h2>📊 年度別合計</h2>
      <div class="chart-wrap"><canvas id="chart-home-year"></canvas></div>
    </div>
    <div class="card">
      <h2>🚨 未払い・要対応</h2>
      <div id="home-alert-list" class="alert-list"></div>
    </div>
  </div>
</div>

<!-- A: 年度別 -->
<div id="tab-a" class="content">
  <div class="grid" id="year-summary"></div>
  <div class="card">
    <h2>📊 年度別 支払い合計</h2>
    <div class="chart-wrap"><canvas id="chart-a"></canvas></div>
  </div>
</div>

<!-- B: 会計区分×年度 -->
<div id="tab-b" class="content">
  <div class="card">
    <h2>🏷 会計区分 × 年度</h2>
    <div class="chart-wrap"><canvas id="chart-b"></canvas></div>
  </div>
  <div class="card"><div class="table-wrap"><table id="table-b"></table></div></div>
</div>

<!-- C: 種別×年度 -->
<div id="tab-c" class="content">
  <div class="card">
    <h2>📂 種別 × 年度</h2>
    <div class="chart-wrap"><canvas id="chart-c"></canvas></div>
  </div>
  <div class="card"><div class="table-wrap"><table id="table-c"></table></div></div>
</div>

<!-- D: 月別推移 -->
<div id="tab-d" class="content">
  <div class="card">
    <h2>📈 月別推移（年度比較）</h2>
    <div class="chart-wrap"><canvas id="chart-d"></canvas></div>
  </div>
  <div class="card"><div class="table-wrap"><table id="table-d"></table></div></div>
</div>

<!-- E: 支払い方法 -->
<div id="tab-e" class="content">
  <div class="card">
    <h2>💳 支払い方法別 合計</h2>
    <div class="pie-wrap">
      <canvas id="chart-e"></canvas>
      <div class="legend" id="legend-e"></div>
    </div>
  </div>
  <div class="card"><div class="table-wrap"><table id="table-e"></table></div></div>
</div>

<!-- F: 前年同月比 -->
<div id="tab-f" class="content">
  <div class="card">
    <h2>📅 前年同月比（<span id="yoy-label"></span>）</h2>
    <div class="chart-wrap"><canvas id="chart-f"></canvas></div>
  </div>
  <div class="card"><div class="table-wrap"><table id="table-f"></table></div></div>
</div>

<!-- アラート -->
<div id="tab-alert" class="content">
  <div class="grid" id="alert-kpi"></div>
  <div class="card">
    <h2>🚨 未払い・要対応一覧</h2>
    <div id="alert-list" class="alert-list"></div>
  </div>
</div>

<!-- 今月 -->
<div id="tab-month" class="content">

  <div class="card">
    <h2>📋 今月の支払い一覧</h2>
    <div class="table-wrap"><table id="table-month"></table></div>
  </div>
</div>

function statusBadge(s) {

  return '<span class="badge '+(map[s]||"badge-gray")+'">'+s+'</span>';
}

function makeGroupedChart(id,labels,groups,data){

// === テーブル共通 ===
function makeTable(id,rows,cols,data,rowLabel){
  const t=document.getElementById(id);
  let h='<thead><tr><th>'+rowLabel+'</th>'+cols.map(c=>'<th>'+c+'</th>').join('')+'<th>合計</th></tr></thead><tbody>';
  const ct={};
  rows.forEach(r=>{
    let rt=0;
    h+='<tr><td>'+r+'</td>';
    cols.forEach(c=>{const v=data[r]?.[c]??0;rt+=v;ct[c]=(ct[c]??0)+v;h+='<td>'+(v>0?fmt(v):'-')+'</td>';});
    h+='<td>'+fmt(rt)+'</td></tr>';
  });
  const gt=Object.values(ct).reduce((a,b)=>a+b,0);
  h+='<tr class="total-row"><td>合計</td>'+cols.map(c=>'<td>'+fmt(ct[c]??0)+'</td>').join('')+'<td>'+fmt(gt)+'</td></tr></tbody>';
  t.innerHTML=h;
}

let tmH='<thead><tr><th>名称</th><th>金額</th><th>状況</th><th>会計区分</th><th>種別</th><th>支払い方法</th><th>支払日</th></tr></thead><tbody>';
DATA.thisMonthRecords.sort((a,b)=>b.amount-a.amount).forEach(r=>{
  tmH+='<tr><td>'+r.name+'<a class="notion-link" href="'+r.notionUrl+'" target="_blank">開く</a></td>'
    +'<td>'+fmt(r.amount)+'</td><td>'+statusBadge(r.status)+'</td><td>'+r.kaikeiKubun+'</td><td>'+r.shubetsu+'</td>'
    +'<td>'+(r.shiharaiHouhou.join(", ")||"-")+'</td><td>'+(r.shiharaiDate||"-")+'</td></tr>';
});
tmH+='<tr class="total-row"><td>合計</td><td>'+fmt(DATA.thisMonthTotal)+'</td><td colspan="5"></td></tr></tbody>';
tm.innerHTML=tmH;

// === 会計処理 ===
const acKpi=document.getElementById("accounting-kpi");
acKpi.innerHTML=[
  {label:"未処理件数", value:DATA.unprocessedRecords.length+"件", cls:DATA.unprocessedRecords.length>0?"alert":"ok"},
  {label:"未処理金額合計", value:fmt(DATA.unprocessedTotal), cls:DATA.unprocessedTotal>0?"warn":"ok"},
].map(k=>'<div class="kpi '+k.cls+'"><div class="label">'+k.label+'</div><div class="value">'+k.value+'</div></div>').join("");

const ta=document.getElementById("table-accounting");
let taH='<thead><tr><th>名称</th><th>金額</th><th>会計処理</th><th>年度</th><th>月</th><th>会計区分</th><th>支払日</th></tr></thead><tbody>';
DATA.unprocessedRecords.sort((a,b)=>b.amount-a.amount).forEach(r=>{
  taH+='<tr><td>'+r.name+'<a class="notion-link" href="'+r.notionUrl+'" target="_blank">開く</a></td>'
    +'<td>'+fmt(r.amount)+'</td><td>'+kaikeiShoriBadge(r.kaikeiShori)+'</td>'
    +'<td>'+r.year+'</td><td>'+r.month+'</td><td>'+r.kaikeiKubun+'</td><td>'+(r.shiharaiDate||"-")+'</td></tr>';
});
taH+='<tr class="total-row"><td>合計</td><td>'+fmt(DATA.unprocessedTotal)+'</td><td colspan="5"></td></tr></tbody>';
ta.innerHTML=taH;
</script>
</body>
